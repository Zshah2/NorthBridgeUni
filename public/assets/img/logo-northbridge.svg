<svg xmlns="http://www.w3.org/2000/svg" width="220" height="44" viewBox="0 0 220 44" role="img" aria-labelledby="title desc">
  <title id="title">Northbridge wordmark</title>
  <desc id="desc">NB monogram with Northbridge University text</desc>
  <defs>
    <linearGradient id="nbGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e879f9"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect x="2" y="4" width="36" height="36" rx="10" fill="#0f0a1a" stroke="rgba(232,121,249,0.35)" stroke-width="1"/>
  <text x="11" y="29" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="16" font-weight="700" fill="url(#nbGrad)">NB</text>
  <text x="46" y="18" font-family="ui-serif, Georgia, Cambria, Times New Roman, Times, serif" font-size="14" font-weight="650" fill="#f8fafc" letter-spacing="0.02em">Northbridge</text>
  <text x="46" y="34" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="11" font-weight="600" fill="#a5f3fc" letter-spacing="0.14em">UNIVERSITY</text>
</svg>
